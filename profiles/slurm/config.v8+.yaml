# ASPIS workflow profile for Snakemake >=8 with the SLURM executor plugin.
#
# Use this for the refactored ASPIS workflow, not for the legacy
# workflow/profiles/slurm cookiecutter profile.
#
# This profile intentionally does not set slurm_account. Accounts are user- and
# grant-specific, so pass the active account at runtime.
#
# Snakemake CLI --default-resources replaces the profile's full
# default-resources list. If you add slurm_account on the CLI, repeat the
# baseline partition/runtime/memory/disk defaults as well:
#
#   snakemake TARGET --workflow-profile profiles/slurm \
#     --default-resources \
#       slurm_account=ELIX6_santini \
#       slurm_partition=g100_usr_prod \
#       runtime=60 \
#       mem_mb=4000 \
#       disk_mb=10000
#
# For the tiny differential contract smoke on G100, prefer:
#
#   bash tests/run_g100_smoke.sh ELIX6_santini
#
# Keep development on local cores. Use this profile only for final dry-runs and
# deliberate cluster submissions.

executor: slurm
jobs: 80
local-cores: 1
latency-wait: 60
rerun-incomplete: true
keep-going: true
printshellcmds: true
show-failed-logs: true
software-deployment-method: conda

default-resources:
  slurm_partition: "g100_usr_prod"
  runtime: 60
  mem_mb: 4000
  disk_mb: 10000

set-threads:
  materialize_library: 1
  build_materialized_manifest: 1
  run_branch_fastqc: 2
  run_branch_multiqc: 1
  check_rnaseq_preprocess_environment: 1
  preprocess_rnaseq_branch: 2
  run_preprocessed_rnaseq_fastqc: 2
  run_preprocessed_rnaseq_multiqc: 1
  build_rnaseq_hisat2_index: 8
  build_rnaseq_star_index: 8
  plan_rnaseq_alignment: 1
  check_rnaseq_alignment_environment: 1
  align_rnaseq_branch: 4
  qc_rnaseq_alignment: 1
  run_rnaseq_alignment_multiqc: 1
  plan_rnaseq_quantification: 1
  check_rnaseq_quantification_environment: 1
  featurecounts_gene_counts: 4
  stringtie_assemble_branch: 4
  merge_stringtie_assemblies: 4
  gffcompare_stringtie_merge: 1
  stringtie_quantify_branch: 4
  build_stringtie_transcript_matrix: 1
  finalize_rnaseq_quantification: 1
  plan_rnaseq_differential: 1
  check_rnaseq_differential_environment: 1
  plan_gene_differential: 1
  plan_transcript_differential: 1
  run_transcript_deseq2: 1
  plan_isoform_switch: 1
  run_gene_deseq2: 1

