# ASPIS workflow profile for Snakemake >=8 with the SLURM executor plugin.
#
# Use this for the refactored ASPIS workflow, not for the legacy
# workflow/profiles/slurm cookiecutter profile.
#
# This profile intentionally does not set slurm_account. Accounts are user- and
# grant-specific, so pass the active account at runtime, for example:
#
#   snakemake --workflow-profile profiles/slurm \
#     --default-resources slurm_account=your_slurm_account
#
# Keep development on local cores. Use this profile only for final dry-runs and
# deliberate cluster submissions.

executor: slurm
jobs: 80
local-cores: 1
latency-wait: 60
rerun-incomplete: true
keep-going: true
printshellcmds: true
show-failed-logs: true
software-deployment-method: conda

default-resources:
  slurm_partition: "g100_usr_prod"
  runtime: 60
  mem_mb: 4000
  disk_mb: 10000

set-threads:
  materialize_library: 1
  build_materialized_manifest: 1
  run_branch_fastqc: 2
  run_branch_multiqc: 1
  check_rnaseq_preprocess_environment: 1
  preprocess_rnaseq_branch: 2
  run_preprocessed_rnaseq_fastqc: 2
  run_preprocessed_rnaseq_multiqc: 1
  plan_rnaseq_alignment: 1

set-resources:
  materialize_library:
    runtime: 360
    mem_mb: 64000
    disk_mb: 250000
  build_materialized_manifest:
    runtime: 15
    mem_mb: 1000
    disk_mb: 1000
  run_branch_fastqc:
    runtime: 60
    mem_mb: 4000
    disk_mb: 10000
  run_branch_multiqc:
    runtime: 15
    mem_mb: 2000
    disk_mb: 2000
  check_rnaseq_preprocess_environment:
    runtime: 5
    mem_mb: 1000
    disk_mb: 1000
  preprocess_rnaseq_branch:
    runtime: 120
    mem_mb: 8000
    disk_mb: 50000
  run_preprocessed_rnaseq_fastqc:
    runtime: 60
    mem_mb: 4000
    disk_mb: 10000
  run_preprocessed_rnaseq_multiqc:
    runtime: 15
    mem_mb: 2000
    disk_mb: 2000
  plan_rnaseq_alignment:
    runtime: 5
    mem_mb: 1000
    disk_mb: 1000
