# ASPIS RNA-seq real-project configuration template.
#
# Copy this file to config/aspis_rnaseq_<project>.yaml and replace all
# /path/to/... entries before running. This template is intentionally separate
# from the toy smoke configs under config/aspis_*_smoke.yaml.

intake: config/intake_rnaseq_project.example.tsv

paths:
  raw_dir: work/rnaseq_project/raw
  metadata_dir: meta/rnaseq_project/materialized
  manifest: meta/rnaseq_project/materialized_manifest.tsv
  analysis_plan: meta/rnaseq_project/analysis_plan.tsv
  environment_report: meta/rnaseq_project/environment_report.tsv
  execution_report: meta/rnaseq_project/execution_report.tsv
  sra_cache_dir: cache/rnaseq_project/sra
  scratch_dir: work/rnaseq_project/tmp
  branch_dir: results/rnaseq_project/branches

materialization:
  local_link_mode: symlink
  sra_max_size: 80G
  sra_spot_limit: 0
  validate_sra: true
  public_metadata_mode: auto
  ena_api_url: https://www.ebi.ac.uk/ena/portal/api/filereport
  public_metadata_timeout: 60

planning:
  allow_unclassified: false

# Central inventory of reference resources used by the project.
# The analysis sections below reference these values with YAML anchors so each
# path is declared once but still reaches the rules that consume it.
resources:
  genome:
    species: homo_sapiens
    provider: ensembl
    release: ""
    fasta: &rnaseq_genome_fasta /path/to/genome.fa
    gtf: &rnaseq_annotation_gtf /path/to/annotation.gtf
    star_genome_dir: &rnaseq_star_genome_dir work/rnaseq_project/reference/star
    hisat2_index_prefix: &rnaseq_hisat2_index_prefix ""
  rnaseq_feature_sets:
    gmt: &rnaseq_feature_set_gmt ""
    tables: &rnaseq_feature_set_tables ""
    provenance: &rnaseq_feature_set_provenance ""
    summary: &rnaseq_feature_set_summary ""

# Optional preparation recipes are intentionally disabled by default.
# Enable only for a pinned resource release, with stable URLs and checksums.
resource_recipes:
  enabled: false
  genome:
    enabled: false
    provider: ensembl
    release: ""
    output_dir: resources/genome
    fasta_url: ""
    fasta_sha256: ""
    gtf_url: ""
    gtf_sha256: ""
  rnaseq_feature_sets:
    enabled: false
    provider: custom
    version: ""
    output_dir: resources/feature_sets/rnaseq
    urls: []
    sha256: []

design:
  condition_col: condition
  control_label: control
  # Examples: "~ patient + condition" for paired designs, or "~ batch + condition".
  model_formula: ""
  covariates:
    - time_h
  batch_factors: []
  blocking_factors: []
  interaction_terms: []
  min_condition_groups: 2

fastq_inspection:
  max_records: 100000

fastqc:
  command: fastqc
  threads: 2
  extra_args: ""

multiqc:
  command: multiqc
  extra_args: ""

rnaseq_preprocess:
  command: fastp
  threads: 4
  extra_args: ""

rnaseq_alignment:
  run: true
  aligner: star
  hisat2_command: hisat2
  hisat2_build_command: hisat2-build
  star_command: STAR
  samtools_command: samtools
  # Set this empty when using a prebuilt STAR/HISAT2 index.
  reference_fasta: *rnaseq_genome_fasta
  hisat2_index_prefix: *rnaseq_hisat2_index_prefix
  star_genome_dir: *rnaseq_star_genome_dir
  annotation_gtf: *rnaseq_annotation_gtf
  strandness: ""
  infer_strandedness: true
  strandedness_inference_max_reads: 200000
  strandedness_min_informative_reads: 100
  strandedness_agreement_threshold: 0.8
  threads: 8
  index_threads: 16
  extra_args: ""
  star_sjdb_overhang: 99
  star_genome_sa_index_nbases: ""
  star_extra_index_args: ""
  star_tmp_dir: ""

rnaseq_quantification:
  run: true
  transcriptome_mode: reference_guided_novel
  gene_counter: featurecounts
  featurecounts_command: featureCounts
  stringtie_command: stringtie
  gffcompare_command: gffcompare
  reference_fasta: *rnaseq_genome_fasta
  annotation_gtf: *rnaseq_annotation_gtf
  read_length: 100
  threads: 8
  featurecounts_threads: 8
  stringtie_threads: 8
  featurecounts_single_extra_args: ""
  featurecounts_paired_extra_args: "-p --countReadPairs"
  featurecounts_strandedness: "0"
  featurecounts_extra_args: ""
  stringtie_strandness: ""
  stringtie_assembly_extra_args: ""
  stringtie_merge_extra_args: ""
  stringtie_quant_extra_args: ""
  known_codes_strict: "="
  known_codes_lenient: "=,c,k,m,n,y"
  gene_type_view: strict
  biotype_summary: true

rnaseq_differential:
  run: true
  method: deseq2
  levels:
    - gene
    - transcript
    # Uncomment this to generate differential/isoform_switch/ reports and
    # event-level exon-structure switch.svg diagrams.
    # - isoform_switch
  reports: true
  report_top_n: 50
  report_feature_sets: *rnaseq_feature_set_gmt
  report_feature_set_tables: *rnaseq_feature_set_tables
  report_feature_set_min_overlap: 2
  report_feature_set_top_n: 20
  report_ranked_feature_set_permutations: 1000
  report_ranked_feature_set_seed: 1
  report_ranked_feature_set_min_mapped: 100
  report_heatmap_modes:
    - significant
    - variable
  report_heatmap_feature_lists: ""
  report_heatmap_significant_fallback: variable
  report_transcript_plot_groups:
    - all
    - known_compatible
    - novel_isoform
    - novel_locus
    - ambiguous
    - artifact
  report_gene_biotype_plot_groups:
    - protein_coding
    - lncRNA
    - pseudogene
    - snoRNA
    - snRNA
    - miRNA
  report_transcript_biotype_plot_groups:
    - protein_coding
    - lncRNA
    - pseudogene
    - snoRNA
    - snRNA
    - miRNA
  report_pca_color_columns:
    - condition
    - time
    - time_h
    - batch
    - batch_id
    - biospecimen
    - biospecimen_id
    - replicate
    - replicate_id
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  isoform_switch_script: workflow/scripts/run_isoform_switch_contrast.R
  isoform_switch_gene_expr: 1.0
  isoform_switch_isoform_expr: 1.0
  isoform_switch_padj: 0.1
  isoform_switch_dif: 0.1
  isoform_switch_max_genes: 30
  isoform_switch_genome_object: ""
  isoform_switch_reports: true
  isoform_switch_report_top_n: 30
  isoform_switch_functional_annotation_tables: []
  isoform_switch_ncrna_annotation_tables: []
  isoform_switch_interproscan_command: ""
  isoform_switch_pfam_command: ""
  isoform_switch_coding_potential_command: ""
  isoform_switch_signalp_command: ""
  isoform_switch_tm_command: ""
  isoform_switch_localization_command: ""
  isoform_switch_disorder_command: ""
  condition_col: condition
  control_label: control
  # Overrides design.model_formula for DESeq2. Leave empty for "~ condition".
  design_formula: ""
  contrast_by:
    - time_h
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0
  lfc_shrinkage: none

rnaseq_dtu:
  # Optional differential transcript usage companion layer.
  # DRIMSeq and DEXSeq are native transcript-feature usage engines. DEXSeqExon
  # is the true exon-bin DEXSeq path: it flattens the GTF with DEXSeq helper
  # scripts, counts aligned BAMs per exon bin, and runs DEXSeq on those counts.
  # SUPPA2 runs transcript events from SUPPA-managed ioi/psi/diffSplice files.
  # rMATS runs junction-event differential splicing from aligned BAMs plus GTF.
  # Set rmats_read_length explicitly; ASPIS blocks native rMATS if it is 0.
  run: false
  method: DRIMSeq
  condition_col: condition
  control_label: control
  contrast_by: []
  min_replicates_per_group: 2
  min_count: 10
  min_samples: 2
  min_proportion: 0.05
  min_gene_count: 10
  min_transcripts_per_gene: 2
  rscript: Rscript
  drimseq_script: workflow/scripts/run_drimseq_dtu.R
  dexseq_script: workflow/scripts/run_dexseq_dtu.R
  dexseq_exon_script: workflow/scripts/run_dexseq_exon_dtu.R
  dexseq_prepare_annotation_command: dexseq_prepare_annotation.py
  dexseq_count_command: dexseq_count.py
  dexseq_count_strandedness: no
  dexseq_count_order: pos
  dexseq_count_mode: union
  dexseq_count_min_mapq: 10
  suppa2_executable: suppa.py
  suppa2_method: empirical
  suppa2_area: 1000
  suppa2_lower_bound: 0.05
  suppa2_tpm_threshold: 0.0
  suppa2_nan_threshold: 0.0
  suppa2_gene_correction: true
  rmats_executable: rmats.py
  rmats_read_length: 0
  rmats_lib_type: fr-unstranded
  rmats_nthread: 4
  rmats_tstat: 4
  rmats_variable_read_length: false
  rmats_extra_args: ""
  plot_padj: 0.05
  plot_top_n: 20
  plot_max_points: 2500
  candidate_methods:
    - DRIMSeq
    - DEXSeq
    - DEXSeqExon
    - SUPPA2
    - rMATS
  drimseq_command: ""
  dexseq_command: ""
  dexseq_exon_command: ""
  suppa2_command: ""
  rmats_command: ""

execution:
  # Leave empty for shared configs. Set site-specific values in the project
  # config, environment, or Snakemake CLI defaults.
  slurm_account: ""
  default_partition: ""
  download_partition: ""
  default_resources:
    runtime: 240
    mem_mb: 16000
    disk_mb: 100000

provenance:
  # Build a lightweight per-branch bundle with run, design, and biological context.
  run: true

biological_qc:
  run: true
  rnaseq_sample_qc: true
  smallrna_sample_qc: true
  true_novel_transcript_reference_fraction: 0.2
  warn_high_true_novel_transcript_fraction: false

environment:
  required_tools:
    - python3
    - snakemake
    - fastqc
    - multiqc
  rnaseq_required_tools:
    - fastp
  rnaseq_alignment_required_tools: auto
  rnaseq_quantification_required_tools:
    - featureCounts
    - stringtie
    - gffcompare
  rnaseq_differential_required_tools:
    - Rscript
    - R::DESeq2
  rnaseq_isoform_switch_optional_tools:
    - hmmscan
    - interproscan.sh
    - cpat
    - CPC2.py
    - signalp
    - deeptmhmm
    - tmhmm
    - deeploc2
    - iupred2a.py
  rnaseq_dtu_optional_tools:
    - R::DRIMSeq
    - R::DEXSeq
    - suppa.py
    - rmats.py
  sra_required_tools:
    - prefetch
    - fasterq-dump
  sra_limited_required_tools:
    - fastq-dump
  optional_tools:
    - vdb-validate
