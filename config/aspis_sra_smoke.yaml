# ASPIS SRA smoke-test configuration.
#
# This config is intentionally separate from config/aspis.yaml so public SRA
# download/conversion tests do not overwrite the default local fixture outputs.

intake: config/intake_sra_smoke.tsv

paths:
  raw_dir: work/sra_smoke/raw
  metadata_dir: meta/sra_smoke/materialized
  manifest: meta/sra_smoke/materialized_manifest.tsv
  analysis_plan: meta/sra_smoke/analysis_plan.tsv
  environment_report: meta/sra_smoke/environment_report.tsv
  sra_cache_dir: cache/sra_smoke
  scratch_dir: work/sra_smoke/tmp
  branch_dir: results/sra_smoke/branches

materialization:
  local_link_mode: symlink
  sra_max_size: 1G
  sra_spot_limit: 10000
  validate_sra: true
  public_metadata_mode: auto
  ena_api_url: https://www.ebi.ac.uk/ena/portal/api/filereport
  public_metadata_timeout: 60

planning:
  allow_unclassified: false

design:
  condition_col: condition
  control_label: control
  covariates:
    - time_h
  min_condition_groups: 2

fastq_inspection:
  max_records: 10000

fastqc:
  command: fastqc
  threads: 1
  extra_args: ""

multiqc:
  command: multiqc
  extra_args: ""

rnaseq_preprocess:
  command: fastp
  threads: 1
  extra_args: ""

rnaseq_alignment:
  run: false
  aligner: hisat2
  hisat2_command: hisat2
  hisat2_build_command: hisat2-build
  samtools_command: samtools
  reference_fasta: ""
  hisat2_index_prefix: ""
  annotation_gtf: ""
  strandness: ""
  threads: 2
  extra_args: ""

execution:
  default_partition: g100_usr_prod
  download_partition: g100_all_serial

environment:
  required_tools:
    - python3
    - snakemake
    - fastqc
    - multiqc
  rnaseq_required_tools:
    - fastp
  rnaseq_alignment_required_tools: auto
  sra_required_tools:
    - prefetch
    - fasterq-dump
  sra_limited_required_tools:
    - fastq-dump
  optional_tools:
    - vdb-validate
