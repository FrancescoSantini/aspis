# ASPIS gene-level DESeq2 smoke-test configuration.
#
# This test bypasses materialization, FASTQ QC, alignment, and quantification.
# It exercises only the gene-level DESeq2 planning and execution contract using
# tiny synthetic count and sample tables under tests/differential/.

deseq2_smoke:
  run: true
  only: true
  project: ASPIS_DESEQ2_SMOKE
  outdir: results/deseq2_smoke/gene_deseq2
  samples: tests/differential/gene_samples.tsv
  gene_counts: tests/differential/gene_counts.tsv
  gene_metadata: tests/differential/gene_metadata.tsv
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_gene.R
  condition_col: condition
  control_label: control
  contrast_by:
    - time_h
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0
  required_tools:
    - Rscript
