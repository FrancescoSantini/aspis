# ASPIS feature-level DESeq2 smoke-test configuration.
#
# This test bypasses materialization, FASTQ QC, alignment, and quantification.
# It exercises the gene- and transcript-level DESeq2 planning and execution contracts using
# tiny synthetic count and sample tables under tests/differential/.

deseq2_smoke:
  run: true
  only: true
  project: ASPIS_DESEQ2_SMOKE
  outdir: results/deseq2_smoke/gene_deseq2
  transcript_run: true
  transcript_outdir: results/deseq2_smoke/transcript_deseq2
  report_run: true
  report_outdir: results/deseq2_smoke/reports
  report_levels:
    - gene
    - transcript
  report_top_n: 20
  report_feature_sets: tests/differential/feature_sets.gmt
  report_feature_set_tables: tests/differential/pathway_feature_sets.tsv
  report_feature_set_min_overlap: 1
  report_feature_set_top_n: 12
  report_ranked_feature_set_permutations: 200
  report_ranked_feature_set_seed: 1
  samples: tests/differential/gene_samples.tsv
  gene_counts: tests/differential/gene_counts.tsv
  gene_metadata: tests/differential/gene_metadata.tsv
  transcript_counts: tests/differential/transcript_counts.tsv
  transcript_metadata: tests/differential/transcript_metadata.tsv
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  condition_col: condition
  control_label: control
  design_formula: ""
  contrast_by:
    - time_h
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0
  required_tools:
    - Rscript
    - R::DESeq2
