# Example feature-set resource block for ASPIS reports.
#
# This is a partial config fragment. Copy the relevant keys into a project
# config such as config/aspis_rnaseq_project.example.yaml or
# config/aspis_smallrna_project.example.yaml, then replace paths with local
# files prepared for the project.
#
# Tiny non-biological examples are available under examples/resources/ when you
# need to verify that report panels are wired correctly before preparing real
# GO/Reactome/WikiPathways/custom or target resources.

resources:
  rnaseq_feature_sets:
    provenance: resources/feature_sets/resource_provenance.tsv
    summary: resources/feature_sets/resource_summary.tsv
  smallrna_targets:
    target_table: resources/smallrna_targets/project_open_targets_targets.tsv
    target_tables:
      - resources/smallrna_targets/project_open_targets_targets.tsv
    target_feature_set_tables:
      - resources/smallrna_targets/project_open_targets_target_feature_sets.tsv
    provenance: resources/smallrna_targets/project_open_targets_target_provenance.tsv
    summary: resources/smallrna_targets/project_open_targets_target_summary.tsv

rnaseq_differential:
  # GMT files: SET_ID, DESCRIPTION, FEATURE_ID...
  # Good for WikiPathways-style or project-owned GMT collections.
  report_feature_sets: >-
    resources/feature_sets/wikipathways_human.gmt,
    resources/feature_sets/project_open_sets.gmt

  # TSV files: set_id, feature_id, optional source, collection, description,
  # and resource_version/version/source_version/database_version/release.
  # Good for GO BP/MF/CC, Reactome, WikiPathways, and custom exported resources.
  report_feature_set_tables: >-
    resources/feature_sets/go_bp.tsv,
    resources/feature_sets/go_mf.tsv,
    resources/feature_sets/go_cc.tsv,
    resources/feature_sets/reactome.tsv

  report_feature_set_min_overlap: 5
  report_feature_set_top_n: 30
  report_ranked_feature_set_permutations: 1000
  report_ranked_feature_set_seed: 1
  report_ranked_feature_set_min_mapped: 100

smallrna:
  # Target-gene feature sets use the same GMT/TSV contracts, but feature_id
  # must match the normalized target_id emitted by the miRNA target table.
  # miRNA target tables can also carry source_version/database_version/release;
  # those values are preserved in target enrichment provenance outputs.
  #
  # Target tables should use target_evidence_type when possible:
  # validated, predicted, conserved, or user_provided. Matched RNA-seq
  # integration adds matched_expressed and inverse_integrated target evidence
  # labels in the derived target-mode outputs.
  target_enrichment_mode: table
  target_table: resources/smallrna_targets/project_open_targets_targets.tsv
  target_tables:
    - resources/smallrna_targets/project_open_targets_targets.tsv

  target_feature_sets: resources/feature_sets/wikipathways_human.gmt
  target_feature_set_tables: >-
    resources/feature_sets/go_bp.tsv,
    resources/feature_sets/reactome.tsv

  target_feature_set_min_overlap: 5
  target_feature_set_top_n: 30

  # Optional miRNA-ID feature sets. These are not target-gene resources:
  # feature_id must match the tested miRNA IDs, not mRNA target genes.
  mirna_feature_set_tables: resources/feature_sets/mirna_seed_families.tsv
  mirna_feature_set_min_overlap: 2
  mirna_feature_set_top_n: 30
