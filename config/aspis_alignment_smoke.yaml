# ASPIS local RNA-seq alignment smoke-test configuration.
#
# This config builds a tiny synthetic HISAT2 index and runs the default local
# FASTQ fixtures through RNA-seq preprocessing and alignment. It is only a
# technical smoke test, not a biological reference.

intake: config/intake.tsv

paths:
  raw_dir: work/alignment_smoke/raw
  metadata_dir: meta/alignment_smoke/materialized
  manifest: meta/alignment_smoke/materialized_manifest.tsv
  analysis_plan: meta/alignment_smoke/analysis_plan.tsv
  environment_report: meta/alignment_smoke/environment_report.tsv
  sra_cache_dir: cache/alignment_smoke/sra
  scratch_dir: work/alignment_smoke/tmp
  branch_dir: results/alignment_smoke/branches

materialization:
  local_link_mode: symlink
  sra_max_size: 1G
  sra_spot_limit: 0
  validate_sra: true
  public_metadata_mode: auto
  ena_api_url: https://www.ebi.ac.uk/ena/portal/api/filereport
  public_metadata_timeout: 60

planning:
  allow_unclassified: false

design:
  condition_col: condition
  control_label: control
  covariates:
    - time_h
  min_condition_groups: 2

fastq_inspection:
  max_records: 10000

fastqc:
  command: fastqc
  threads: 1
  extra_args: ""

multiqc:
  command: multiqc
  extra_args: ""

rnaseq_preprocess:
  command: fastp
  threads: 1
  extra_args: ""

rnaseq_alignment:
  run: true
  aligner: hisat2
  hisat2_command: hisat2
  hisat2_build_command: hisat2-build
  star_command: STAR
  samtools_command: samtools
  reference_fasta: tests/reference/rnaseq_toy.fa
  hisat2_index_prefix: work/alignment_smoke/reference/rnaseq_toy
  star_genome_dir: ""
  annotation_gtf: tests/reference/rnaseq_toy.gtf
  strandness: ""
  threads: 2
  index_threads: 2
  extra_args: ""
  star_sjdb_overhang: ""
  star_genome_sa_index_nbases: ""
  star_extra_index_args: ""

execution:
  default_partition: g100_usr_prod
  download_partition: g100_all_serial

environment:
  required_tools:
    - python3
    - snakemake
    - fastqc
    - multiqc
  rnaseq_required_tools:
    - fastp
  rnaseq_alignment_required_tools:
    - hisat2
    - hisat2-build
    - samtools
  sra_required_tools:
    - prefetch
    - fasterq-dump
  sra_limited_required_tools:
    - fastq-dump
  optional_tools:
    - vdb-validate
