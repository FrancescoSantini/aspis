# G100 BEAS_2B combined RNA-seq + smallRNA validation configuration.
#
# This config is intended for matched BEAS validation after both long and short
# RNA FASTQs are uploaded.
#
# ORA/GSEA, smallRNA target enrichment, and isoform-switch consequence
# annotation remain file-based. Set the resource paths below to real
# GO/Reactome/KEGG/MSigDB, miRNA target, and optional functional-annotation
# tables before interpreting those layers biologically.

intake: config/intake_g100_beas_full.tsv
paths:
  raw_dir: work/g100_beas_full/raw
  metadata_dir: meta/g100_beas_full/materialized
  manifest: meta/g100_beas_full/materialized_manifest.tsv
  analysis_plan: meta/g100_beas_full/analysis_plan.tsv
  environment_report: meta/g100_beas_full/environment_report.tsv
  execution_report: meta/g100_beas_full/execution_report.tsv
  sra_cache_dir: cache/g100_beas_full/sra
  scratch_dir: work/g100_beas_full/tmp
  branch_dir: results/g100_beas_full/branches
  run_dashboard: results/g100_beas_full/index.html
  run_dashboard_done: results/g100_beas_full/index.done
  project_report_dir: results/g100_beas_full/projects
materialization:
  local_link_mode: symlink
  public_metadata_mode: 'off'
planning:
  allow_unclassified: false
resources:
  genome:
    species: homo_sapiens
    provider: ensembl
    release: '112'
    fasta: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.dna.toplevel.fa
    gtf: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.112.chr.gtf
    hisat2_index_prefix: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/hisat2_index/genome
    star_genome_dir: ''
  rnaseq_feature_sets:
    # Fill these with real GO/Reactome/KEGG/MSigDB or project-specific resources
    # to enable RNA-seq ORA/GSEA. Empty values produce not_configured status.
    gmt: ''
    tables: ''
  mirbase:
    provider: mirbase
    release: uploaded_legacy
    species_prefix: hsa
    mature_fasta: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/mature_hsa.fa
    prepared_fasta: ''
    saf: ''
    bowtie_index_prefix: ''
  smallrna_contaminants:
    fasta: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/contaminants.fa
    bowtie_index_prefix: ''
  residual_genome:
    fasta: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.dna.toplevel.fa
    gtf: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.112.chr.gtf
    bowtie_index_prefix: ''
  smallrna_targets:
    # Fill these with real miRNA target and target-gene feature-set resources
    # to enable smallRNA target enrichment and matched miRNA-mRNA integration.
    target_table: ''
    target_tables: &id001 []
    target_cache: ''
    target_feature_sets: ''
    target_feature_set_tables: ''
resource_recipes:
  enabled: false
design:
  condition_col: condition
  control_label: control
  model_formula: ''
  covariates:
  - time_h
  batch_factors: []
  blocking_factors: []
  interaction_terms: []
  min_condition_groups: 2
fastq_inspection:
  max_records: 100000
fastqc:
  command: fastqc
  threads: 2
  extra_args: ''
multiqc:
  command: multiqc
  extra_args: ''
rnaseq_preprocess:
  command: fastp
  threads: 4
  extra_args: ''
rnaseq_alignment:
  run: true
  aligner: hisat2
  hisat2_command: hisat2
  hisat2_build_command: hisat2-build
  star_command: STAR
  samtools_command: samtools
  reference_fasta: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.dna.toplevel.fa
  hisat2_index_prefix: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/hisat2_index/genome
  star_genome_dir: ''
  annotation_gtf: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.112.chr.gtf
  strandness: ''
  infer_strandedness: true
  strandedness_inference_max_reads: 200000
  strandedness_min_informative_reads: 100
  strandedness_agreement_threshold: 0.8
  threads: 8
  index_threads: 8
  extra_args: ''
  star_sjdb_overhang: 74
  star_genome_sa_index_nbases: ''
  star_extra_index_args: ''
  star_tmp_dir: ''
rnaseq_quantification:
  run: true
  transcriptome_mode: reference_guided_novel
  gene_counter: featurecounts
  featurecounts_command: featureCounts
  stringtie_command: stringtie
  gffcompare_command: gffcompare
  reference_fasta: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.dna.toplevel.fa
  annotation_gtf: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.112.chr.gtf
  read_length: 75
  threads: 8
  featurecounts_threads: 8
  stringtie_threads: 8
  featurecounts_single_extra_args: ''
  featurecounts_paired_extra_args: -p --countReadPairs
  featurecounts_extra_args: ''
  stringtie_strandness: ''
  stringtie_assembly_extra_args: ''
  stringtie_merge_extra_args: ''
  stringtie_quant_extra_args: ''
  known_codes_strict: '='
  known_codes_lenient: =,c,k,m,n,y
  gene_type_view: strict
  biotype_summary: true
rnaseq_differential:
  run: true
  method: deseq2
  levels:
  - gene
  - transcript
  - isoform_switch
  reports: true
  report_top_n: 50
  report_feature_sets: ''
  report_feature_set_tables: ''
  report_feature_set_min_overlap: 2
  report_feature_set_top_n: 20
  report_ranked_feature_set_permutations: 1000
  report_ranked_feature_set_seed: 1
  report_ranked_feature_set_min_mapped: 100
  report_heatmap_modes:
  - significant
  - variable
  report_heatmap_feature_lists: ''
  report_heatmap_significant_fallback: variable
  report_transcript_plot_groups:
  - all
  - known_compatible
  - novel_isoform
  - novel_locus
  - ambiguous
  - artifact
  report_gene_biotype_plot_groups:
  - protein_coding
  - lncRNA
  - pseudogene
  - snoRNA
  - snRNA
  - miRNA
  report_transcript_biotype_plot_groups:
  - protein_coding
  - lncRNA
  - pseudogene
  - snoRNA
  - snRNA
  - miRNA
  report_pca_color_columns:
  - condition
  - time_h
  - batch
  - biospecimen_id
  - replicate
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  isoform_switch_script: workflow/scripts/run_isoform_switch_contrast.R
  isoform_switch_gene_expr: 1.0
  isoform_switch_isoform_expr: 1.0
  isoform_switch_padj: 0.1
  isoform_switch_dif: 0.1
  isoform_switch_max_genes: 30
  isoform_switch_genome_object: ''
  isoform_switch_reports: true
  isoform_switch_report_top_n: 30
  # Fill these with precomputed annotation tables or command templates if you
  # want protein-domain/coding-potential/signal-peptide/TM/localization effects.
  # Empty values still produce switch calls and exon plots, but consequence
  # annotation is reported as not_configured.
  isoform_switch_functional_annotation_tables: []
  isoform_switch_ncrna_annotation_tables: []
  isoform_switch_interproscan_command: ''
  isoform_switch_pfam_command: ''
  isoform_switch_coding_potential_command: ''
  isoform_switch_signalp_command: ''
  isoform_switch_tm_command: ''
  isoform_switch_localization_command: ''
  isoform_switch_disorder_command: ''
  condition_col: condition
  control_label: control
  design_formula: ''
  contrast_by:
  - time_h
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0
  lfc_shrinkage: none
rnaseq_dtu:
  run: false
  method: planned
  candidate_methods:
  - DRIMSeq
  - DEXSeq
  - SUPPA2
  - rMATS
  drimseq_command: ''
  dexseq_command: ''
  suppa2_command: ''
  rmats_command: ''
smallrna:
  run: true
  preprocess_run: true
  depletion_run: true
  alignment_run: true
  quantification_run: true
  differential_run: true
  adapter: AGATCGGAAGAGCACACGTCTGAACTCC
  min_length: 15
  max_length: 30
  quality_cutoff: 20
  cutadapt_overlap: 5
  cutadapt_command: cutadapt
  cutadapt_extra_args: ''
  threads: 4
  reference_run: true
  reference_dir: work/g100_beas_full/smallrna_reference
  mirbase_fasta: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/mature_hsa.fa
  mirbase_species_prefix: hsa
  mirbase_replace_u_with_t: true
  prepared_mirbase_fasta: ''
  prepared_mirbase_saf: ''
  build_bowtie_index: true
  build_contaminant_index: true
  bowtie_build_command: bowtie-build
  bowtie_command: bowtie
  samtools_command: samtools
  index_threads: 4
  bowtie_index_prefix: ''
  contaminant_fasta: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/contaminants.fa
  contaminant_index_prefix: ''
  contaminant_mismatches: 1
  alignment_mismatches: 2
  alignment_multi_alignments: 10
  alignment_extra_args: --best --strata
  residual_run: false
  build_residual_genome_index: false
  residual_genome_fasta: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.dna.toplevel.fa
  residual_genome_index_prefix: ''
  residual_annotation_gtf: /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.112.chr.gtf
  residual_mismatches: 1
  residual_multi_alignments: 10
  residual_extra_args: --best --strata
  featurecounts_command: featureCounts
  featurecounts_threads: 4
  featurecounts_extra_args: ''
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  condition_col: condition
  control_label: control
  design_formula: ''
  contrast_by:
  - time_h
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0
  lfc_shrinkage: none
  # Enable target enrichment after providing a real miRNA target table below.
  # "disabled" reports a clear not-configured status instead of running toy biology.
  target_enrichment_mode: disabled
  target_table: ''
  target_tables: *id001
  target_cache: ''
  target_min_overlap: 1
  target_top_n: 20
  target_feature_sets: ''
  target_feature_set_tables: ''
  target_feature_set_min_overlap: 2
  target_feature_set_top_n: 20
  reports: true
  report_top_n: 25
  report_heatmap_modes:
  - significant
  - variable
  report_heatmap_feature_lists: ''
  report_heatmap_significant_fallback: variable
  report_mirna_plot_groups:
  - all
  - up
  - down
  - arm
  - target_source
  - target_source_type
  - target_evidence_type
mirna_mrna_integration:
  # Enable after smallrna.target_enrichment_mode is set to "table" and real
  # miRNA target resources are configured. The combined project report will then
  # link miRNA-mRNA inverse target-set summaries beside RNA-seq differential
  # results.
  run: false
  match_columns:
  - biospecimen_id
  min_pairs: 2
  min_abs_correlation: 0.0
  top_n: 40
execution:
  slurm_account: ''
  default_partition: g100_usr_prod
  download_partition: g100_all_serial
  default_resources:
    runtime: 240
    mem_mb: 16000
    disk_mb: 100000
provenance:
  run: true
biological_qc:
  run: true
  rnaseq_sample_qc: true
  smallrna_sample_qc: true
  true_novel_transcript_reference_fraction: 0.2
  warn_high_true_novel_transcript_fraction: false
  smallrna_length_qc: true
environment:
  required_tools:
  - python3
  - snakemake
  - fastqc
  - multiqc
  rnaseq_required_tools:
  - fastp
  rnaseq_alignment_required_tools: auto
  rnaseq_quantification_required_tools:
  - featureCounts
  - stringtie
  - gffcompare
  rnaseq_differential_required_tools:
  - Rscript
  - R::DESeq2
  - R::MASS
  - R::IsoformSwitchAnalyzeR
  rnaseq_isoform_switch_optional_tools:
  - hmmscan
  - interproscan.sh
  - cpat
  - CPC2.py
  - signalp
  - deeptmhmm
  - tmhmm
  - deeploc2
  - iupred2a.py
  rnaseq_dtu_optional_tools:
  - R::DRIMSeq
  - R::DEXSeq
  - suppa.py
  - rmats.py
  sra_required_tools:
  - prefetch
  - fasterq-dump
  sra_limited_required_tools:
  - fastq-dump
  optional_tools:
  - vdb-validate
  smallrna_required_tools:
  - cutadapt
  - bowtie
  - bowtie-build
  - samtools
  - featureCounts
  - Rscript
  - R::DESeq2
