# ASPIS G100 public-SRA smallRNA ingestion/preprocess milestone.
#
# This configuration uses real public miRNA-seq accessions, capped with
# fastq-dump -X, and stops after adapter trimming plus QC. Full miRBase,
# residual-genome, and differential tests remain in the fixture smoke and real
# project configs where references are explicit.

intake: config/intake_smallrna_public_sra_g100.tsv

paths:
  raw_dir: work/smallrna_public_sra_g100/raw
  metadata_dir: meta/smallrna_public_sra_g100/materialized
  manifest: meta/smallrna_public_sra_g100/materialized_manifest.tsv
  analysis_plan: meta/smallrna_public_sra_g100/analysis_plan.tsv
  environment_report: meta/smallrna_public_sra_g100/environment_report.tsv
  sra_cache_dir: cache/smallrna_public_sra_g100/sra
  scratch_dir: work/smallrna_public_sra_g100/tmp
  branch_dir: results/smallrna_public_sra_g100/branches

materialization:
  local_link_mode: symlink
  sra_max_size: 1G
  sra_spot_limit: 10000
  validate_sra: false
  public_metadata_mode: required
  ena_api_url: https://www.ebi.ac.uk/ena/portal/api/filereport
  public_metadata_timeout: 60

planning:
  allow_unclassified: false

design:
  condition_col: condition
  control_label: control
  covariates:
    - tissue_state
  min_condition_groups: 2

fastq_inspection:
  max_records: 10000

fastqc:
  command: fastqc
  threads: 1
  extra_args: ""

multiqc:
  command: multiqc
  extra_args: ""

smallrna:
  run: true
  preprocess_run: true
  depletion_run: false
  alignment_run: false
  residual_run: false
  quantification_run: false
  differential_run: false
  reports: false
  adapter: AGATCGGAAGAGCACACGTCTGAACTCC
  min_length: 15
  max_length: 35
  quality_cutoff: 20
  cutadapt_overlap: 5
  cutadapt_command: cutadapt
  cutadapt_extra_args: ""
  threads: 1
  reference_run: false
  build_bowtie_index: false
  build_contaminant_index: false
  build_residual_genome_index: false
  condition_col: condition
  control_label: control
  contrast_by:
    - tissue_state
  min_replicates_per_group: 2

execution:
  default_partition: g100_usr_prod
  download_partition: g100_all_serial

environment:
  required_tools:
    - python3
    - snakemake
    - fastqc
    - multiqc
  smallrna_required_tools:
    - cutadapt
  sra_limited_required_tools:
    - fastq-dump
