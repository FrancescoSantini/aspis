# Local first-pass RNA-seq-only config for Francesco's legacy PhD samples.
#
# Use this with tests/run_local_rnaseq_project.sh when you want the existing
# RNA-seq real-project preflight before running a small local target.

intake: config/intake_phdpipe_rnaseq_real.tsv

paths:
  raw_dir: work/phdpipe_rnaseq_real/raw
  metadata_dir: meta/phdpipe_rnaseq_real/materialized
  manifest: meta/phdpipe_rnaseq_real/materialized_manifest.tsv
  analysis_plan: meta/phdpipe_rnaseq_real/analysis_plan.tsv
  environment_report: meta/phdpipe_rnaseq_real/environment_report.tsv
  execution_report: meta/phdpipe_rnaseq_real/execution_report.tsv
  sra_cache_dir: cache/phdpipe_rnaseq_real/sra
  scratch_dir: work/phdpipe_rnaseq_real/tmp
  branch_dir: results/phdpipe_rnaseq_real/branches

materialization:
  local_link_mode: symlink
  public_metadata_mode: "off"

design:
  condition_col: condition
  control_label: control
  covariates:
    - time_h
  min_condition_groups: 2

rnaseq_alignment:
  run: false

rnaseq_quantification:
  run: false

rnaseq_differential:
  run: false
  contrast_by:
    - time_h

biological_qc:
  run: false
