# G100 BEAS_2B RNA-seq validation configuration.
#
# This config assumes BEAS_2B RNA-seq FASTQs and legacy reference assets have
# been uploaded under /g100_work. It is intentionally BEAS-only so the first
# real-data validation can complete before adding HEP_G2.

intake: config/intake_g100_beas_rnaseq.tsv

paths:
  raw_dir: work/g100_beas_rnaseq/raw
  metadata_dir: meta/g100_beas_rnaseq/materialized
  manifest: meta/g100_beas_rnaseq/materialized_manifest.tsv
  analysis_plan: meta/g100_beas_rnaseq/analysis_plan.tsv
  environment_report: meta/g100_beas_rnaseq/environment_report.tsv
  execution_report: meta/g100_beas_rnaseq/execution_report.tsv
  sra_cache_dir: cache/g100_beas_rnaseq/sra
  scratch_dir: work/g100_beas_rnaseq/tmp
  branch_dir: results/g100_beas_rnaseq/branches
  run_dashboard: results/g100_beas_rnaseq/index.html
  run_dashboard_done: results/g100_beas_rnaseq/index.done

materialization:
  local_link_mode: symlink
  public_metadata_mode: "off"

planning:
  allow_unclassified: false

resources:
  genome:
    species: homo_sapiens
    provider: ensembl
    release: "112"
    fasta: &rnaseq_genome_fasta /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.dna.toplevel.fa
    gtf: &rnaseq_annotation_gtf /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/Homo_sapiens.GRCh38.112.chr.gtf
    hisat2_index_prefix: &rnaseq_hisat2_index_prefix /g100_work/ELIX6_santini/aspis_data/phdpipe/genome/hisat2_index/genome
    star_genome_dir: &rnaseq_star_genome_dir ""
  rnaseq_feature_sets:
    gmt: &rnaseq_feature_set_gmt ""
    tables: &rnaseq_feature_set_tables ""

resource_recipes:
  enabled: false

design:
  condition_col: condition
  control_label: control
  model_formula: ""
  covariates:
    - time_h
  batch_factors: []
  blocking_factors: []
  interaction_terms: []
  min_condition_groups: 2

fastq_inspection:
  max_records: 100000

fastqc:
  command: fastqc
  threads: 2
  extra_args: ""

multiqc:
  command: multiqc
  extra_args: ""

rnaseq_preprocess:
  command: fastp
  threads: 4
  extra_args: ""

rnaseq_alignment:
  run: true
  aligner: hisat2
  hisat2_command: hisat2
  hisat2_build_command: hisat2-build
  star_command: STAR
  samtools_command: samtools
  reference_fasta: *rnaseq_genome_fasta
  hisat2_index_prefix: *rnaseq_hisat2_index_prefix
  star_genome_dir: *rnaseq_star_genome_dir
  annotation_gtf: *rnaseq_annotation_gtf
  strandness: ""
  infer_strandedness: true
  strandedness_inference_max_reads: 200000
  strandedness_min_informative_reads: 100
  strandedness_agreement_threshold: 0.8
  threads: 8
  index_threads: 8
  extra_args: ""
  star_sjdb_overhang: 74
  star_genome_sa_index_nbases: ""
  star_extra_index_args: ""
  star_tmp_dir: ""

rnaseq_quantification:
  run: true
  transcriptome_mode: reference_guided_novel
  gene_counter: featurecounts
  featurecounts_command: featureCounts
  stringtie_command: stringtie
  gffcompare_command: gffcompare
  reference_fasta: *rnaseq_genome_fasta
  annotation_gtf: *rnaseq_annotation_gtf
  read_length: 75
  threads: 8
  featurecounts_threads: 8
  stringtie_threads: 8
  featurecounts_single_extra_args: ""
  featurecounts_paired_extra_args: "-p --countReadPairs"
  featurecounts_extra_args: ""
  stringtie_strandness: ""
  stringtie_assembly_extra_args: ""
  stringtie_merge_extra_args: ""
  stringtie_quant_extra_args: ""
  known_codes_strict: "="
  known_codes_lenient: "=,c,k,m,n,y"
  gene_type_view: strict
  biotype_summary: true

rnaseq_differential:
  run: true
  method: deseq2
  levels:
    - gene
    - transcript
    - isoform_switch
  reports: true
  report_top_n: 50
  report_feature_sets: *rnaseq_feature_set_gmt
  report_feature_set_tables: *rnaseq_feature_set_tables
  report_feature_set_min_overlap: 2
  report_feature_set_top_n: 20
  report_ranked_feature_set_permutations: 1000
  report_ranked_feature_set_seed: 1
  report_ranked_feature_set_min_mapped: 100
  report_heatmap_modes:
    - significant
    - variable
  report_heatmap_feature_lists: ""
  report_heatmap_significant_fallback: variable
  report_transcript_plot_groups:
    - all
    - known_compatible
    - novel_isoform
    - novel_locus
    - ambiguous
    - artifact
  report_gene_biotype_plot_groups:
    - protein_coding
    - lncRNA
    - pseudogene
    - snoRNA
    - snRNA
    - miRNA
  report_transcript_biotype_plot_groups:
    - protein_coding
    - lncRNA
    - pseudogene
    - snoRNA
    - snRNA
    - miRNA
  report_pca_color_columns:
    - condition
    - time_h
    - batch
    - biospecimen_id
    - replicate
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  isoform_switch_script: workflow/scripts/run_isoform_switch_contrast.R
  isoform_switch_gene_expr: 1.0
  isoform_switch_isoform_expr: 1.0
  isoform_switch_padj: 0.1
  isoform_switch_dif: 0.1
  isoform_switch_max_genes: 30
  isoform_switch_genome_object: ""
  isoform_switch_reports: true
  isoform_switch_report_top_n: 30
  isoform_switch_functional_annotation_tables: []
  isoform_switch_ncrna_annotation_tables: []
  isoform_switch_interproscan_command: ""
  isoform_switch_pfam_command: ""
  isoform_switch_coding_potential_command: ""
  isoform_switch_signalp_command: ""
  isoform_switch_tm_command: ""
  isoform_switch_localization_command: ""
  isoform_switch_disorder_command: ""
  condition_col: condition
  control_label: control
  design_formula: ""
  contrast_by:
    - time_h
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0
  lfc_shrinkage: none

rnaseq_dtu:
  run: false
  method: planned
  candidate_methods:
    - DRIMSeq
    - DEXSeq
    - SUPPA2
    - rMATS
  drimseq_command: ""
  dexseq_command: ""
  suppa2_command: ""
  rmats_command: ""

smallrna:
  run: false

mirna_mrna_integration:
  run: false

execution:
  slurm_account: ""
  default_partition: g100_usr_prod
  download_partition: g100_all_serial
  default_resources:
    runtime: 240
    mem_mb: 16000
    disk_mb: 100000

provenance:
  run: true

biological_qc:
  run: true
  rnaseq_sample_qc: true
  smallrna_sample_qc: false
  true_novel_transcript_reference_fraction: 0.2
  warn_high_true_novel_transcript_fraction: false

environment:
  required_tools:
    - python3
    - snakemake
    - fastqc
    - multiqc
  rnaseq_required_tools:
    - fastp
  rnaseq_alignment_required_tools: auto
  rnaseq_quantification_required_tools:
    - featureCounts
    - stringtie
    - gffcompare
  rnaseq_differential_required_tools:
    - Rscript
    - R::DESeq2
    - R::IsoformSwitchAnalyzeR
  rnaseq_isoform_switch_optional_tools:
    - hmmscan
    - interproscan.sh
    - cpat
    - CPC2.py
    - signalp
    - deeptmhmm
    - tmhmm
    - deeploc2
    - iupred2a.py
  rnaseq_dtu_optional_tools:
    - R::DRIMSeq
    - R::DEXSeq
    - suppa.py
    - rmats.py
  sra_required_tools:
    - prefetch
    - fasterq-dump
  sra_limited_required_tools:
    - fastq-dump
  optional_tools:
    - vdb-validate
