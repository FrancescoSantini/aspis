# ASPIS first-stage configuration.
#
# This file is intentionally separate from config/config.yaml, which still
# belongs to the legacy long/small RNA workflows.

intake: config/intake.tsv

paths:
  raw_dir: work/raw
  metadata_dir: meta/materialized
  manifest: meta/materialized_manifest.tsv
  environment_report: meta/environment_report.tsv
  execution_report: meta/execution_report.tsv
  sra_cache_dir: cache/sra
  scratch_dir: work/tmp
  branch_dir: results/branches

materialization:
  local_link_mode: symlink
  sra_max_size: 40G
  sra_spot_limit: 0
  validate_sra: true
  public_metadata_mode: auto
  ena_api_url: https://www.ebi.ac.uk/ena/portal/api/filereport
  public_metadata_timeout: 60

planning:
  allow_unclassified: false

design:
  condition_col: condition
  control_label: control
  # Optional model metadata. Leave model_formula empty for the default "~ condition".
  model_formula: ""
  covariates:
    - time_h
  batch_factors: []
  blocking_factors: []
  interaction_terms: []
  min_condition_groups: 2

fastq_inspection:
  max_records: 100000

fastqc:
  command: fastqc
  threads: 2
  extra_args: ""

multiqc:
  command: multiqc
  extra_args: ""

rnaseq_preprocess:
  command: fastp
  threads: 2
  extra_args: ""

rnaseq_alignment:
  run: false
  aligner: star
  hisat2_command: hisat2
  hisat2_build_command: hisat2-build
  star_command: STAR
  samtools_command: samtools
  reference_fasta: ""
  hisat2_index_prefix: ""
  star_genome_dir: ""
  annotation_gtf: ""
  strandness: ""
  infer_strandedness: false
  strandedness_inference_max_reads: 200000
  strandedness_min_informative_reads: 100
  strandedness_agreement_threshold: 0.8
  threads: 4
  index_threads: 8
  extra_args: ""
  star_sjdb_overhang: ""
  star_genome_sa_index_nbases: ""
  star_extra_index_args: ""
  star_tmp_dir: ""

rnaseq_quantification:
  run: false
  transcriptome_mode: reference_guided_novel
  gene_counter: featurecounts
  featurecounts_command: featureCounts
  stringtie_command: stringtie
  gffcompare_command: gffcompare
  reference_fasta: ""
  annotation_gtf: ""
  read_length: 75
  threads: 4
  featurecounts_threads: 4
  stringtie_threads: 4
  featurecounts_single_extra_args: ""
  featurecounts_paired_extra_args: "-p --countReadPairs"
  featurecounts_extra_args: ""
  stringtie_strandness: ""
  stringtie_assembly_extra_args: ""
  stringtie_merge_extra_args: ""
  stringtie_quant_extra_args: ""
  known_codes_strict: "="
  known_codes_lenient: "=,c,k,m,n,y"
  gene_type_view: strict
  biotype_summary: true

rnaseq_differential:
  run: false
  method: deseq2
  levels:
    - gene
  reports: true
  report_top_n: 50
  report_feature_sets: ""
  report_feature_set_tables: ""
  report_feature_set_min_overlap: 2
  report_feature_set_top_n: 20
  report_ranked_feature_set_permutations: 1000
  report_ranked_feature_set_seed: 1
  report_ranked_feature_set_min_mapped: 100
  report_transcript_plot_groups:
    - all
    - known_compatible
    - novel_isoform
    - novel_locus
    - ambiguous
    - artifact
  report_pca_color_columns:
    - condition
    - time
    - time_h
    - batch
    - batch_id
    - biospecimen
    - biospecimen_id
    - replicate
    - replicate_id
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  isoform_switch_script: workflow/scripts/run_isoform_switch_contrast.R
  isoform_switch_gene_expr: 1.0
  isoform_switch_isoform_expr: 1.0
  isoform_switch_padj: 0.1
  isoform_switch_dif: 0.1
  isoform_switch_max_genes: 30
  isoform_switch_genome_object: ""
  isoform_switch_reports: true
  isoform_switch_report_top_n: 30
  # Optional TSV(s) with columns such as isoform_id/source/feature_type/
  # feature_id/feature_name/start_aa/end_aa/description. These can be
  # InterProScan, Pfam/hmmscan, SignalP/TM/localization, or user-curated tables.
  isoform_switch_functional_annotation_tables: []
  # Optional TSV(s) with ncRNA switch resources. Rows can match by transcript_id,
  # gene_id, or chrom/start/end overlap with gained/lost switch intervals.
  # Useful feature_type values: conserved_exon, rbp_motif, mirna_motif,
  # host_small_rna, antisense_overlap.
  isoform_switch_ncrna_annotation_tables: []
  # Optional command templates for advanced annotation tools. Templates may use
  # {aa_fasta}, {nt_fasta}, {outdir}, and {tool_name}. Leave empty to only
  # report tool availability and import precomputed annotation TSVs.
  isoform_switch_interproscan_command: ""
  isoform_switch_pfam_command: ""
  isoform_switch_coding_potential_command: ""
  isoform_switch_signalp_command: ""
  isoform_switch_tm_command: ""
  isoform_switch_localization_command: ""
  isoform_switch_disorder_command: ""
  condition_col: condition
  control_label: control
  design_formula: ""
  contrast_by: []
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0
  lfc_shrinkage: none

rnaseq_dtu:
  # Optional event-level / differential transcript usage companion layer.
  # Leave command templates empty to record a method-ready manifest without
  # executing external engines. Templates may use {samples}, {aligned_samples},
  # {transcript_counts}, {transcript_metadata}, {annotation_gtf}, {outdir},
  # {project}, and {method}.
  run: false
  method: planned
  candidate_methods:
    - DRIMSeq
    - DEXSeq
    - SUPPA2
    - rMATS
  drimseq_command: ""
  dexseq_command: ""
  suppa2_command: ""
  rmats_command: ""

smallrna:
  run: false
  preprocess_run: false
  depletion_run: false
  alignment_run: false
  quantification_run: false
  adapter: AGATCGGAAGAGCACACGTCTGAACTCC
  min_length: 15
  max_length: 30
  quality_cutoff: 20
  cutadapt_overlap: 5
  cutadapt_command: cutadapt
  cutadapt_extra_args: ""
  threads: 1
  reference_run: false
  reference_dir: work/smallrna_reference
  mirbase_species_prefix: ""
  mirbase_replace_u_with_t: true
  prepared_mirbase_fasta: ""
  prepared_mirbase_saf: ""
  build_bowtie_index: false
  build_contaminant_index: false
  bowtie_build_command: bowtie-build
  bowtie_command: bowtie
  samtools_command: samtools
  index_threads: 1
  contaminant_mismatches: 1
  alignment_mismatches: 2
  alignment_multi_alignments: 10
  alignment_extra_args: "--best --strata"
  residual_run: false
  build_residual_genome_index: false
  residual_genome_fasta: ""
  residual_genome_index_prefix: ""
  residual_annotation_gtf: ""
  residual_mismatches: 1
  residual_multi_alignments: 10
  residual_extra_args: "--best --strata"
  featurecounts_command: featureCounts
  featurecounts_threads: 1
  featurecounts_extra_args: ""
  differential_run: false
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  min_count: 10
  mirbase_fasta: ""
  mirbase_saf: ""
  bowtie_index_prefix: ""
  contaminant_fasta: ""
  contaminant_index_prefix: ""
  target_enrichment_mode: disabled
  target_table: ""
  target_tables: []
  target_min_overlap: 1
  target_top_n: 20
  target_feature_sets: ""
  target_feature_set_tables: ""
  target_feature_set_min_overlap: 2
  target_feature_set_top_n: 20
  mirna_feature_sets: ""
  mirna_feature_set_tables: ""
  mirna_feature_set_min_overlap: 2
  mirna_feature_set_top_n: 20
  reports: true
  report_pca_color_columns:
    - condition
    - time
    - time_h
    - batch
    - batch_id
    - biospecimen
    - biospecimen_id
    - replicate
    - replicate_id
  condition_col: condition
  control_label: control
  design_formula: ""
  contrast_by: []
  min_replicates_per_group: 2
  padj: 0.1
  log2fc: 1.0
  lfc_shrinkage: none

mirna_mrna_integration:
  # Optional joint layer for projects that contain matched RNA-seq and smallRNA branches.
  run: false
  match_columns:
    - biospecimen_id
  min_pairs: 2
  min_abs_correlation: 0.0
  top_n: 40

execution:
  # Leave empty for shared configs. G100 helpers set SLURM_ACCOUNT at runtime.
  slurm_account: ""
  # Default submit partition for ordinary compute jobs.
  default_partition: g100_usr_prod
  # Partition for public INSDC/SRA materialization jobs.
  download_partition: g100_all_serial
  # Baseline Snakemake default resources used by helpers and reports.
  default_resources:
    runtime: 60
    mem_mb: 4000
    disk_mb: 10000

provenance:
  # Build a lightweight per-branch bundle with run, design, and biological context.
  run: true

biological_qc:
  # Build sample-level count QC plots/tables after RNA-seq and smallRNA quantification.
  run: true
  rnaseq_sample_qc: true
  smallrna_sample_qc: true
  smallrna_length_qc: true
  smallrna_length_qc_max_reads: 200000
  biological_warnings: true
  min_detected_features: 10
  min_library_size: 100
  min_sample_correlation: 0.6
  max_unclassified_biotype_fraction: 0.5
  true_novel_transcript_reference_fraction: 0.2
  warn_high_true_novel_transcript_fraction: false
  max_residual_genome_fraction: 0.5

environment:
  required_tools:
    - python3
    - snakemake
    - fastqc
    - multiqc
  rnaseq_required_tools:
    - fastp
  rnaseq_alignment_required_tools: auto
  rnaseq_quantification_required_tools:
    - featureCounts
    - stringtie
    - gffcompare
  rnaseq_differential_required_tools:
    - Rscript
    - R::DESeq2
  rnaseq_isoform_switch_optional_tools:
    - hmmscan
    - interproscan.sh
    - signalp
    - deeptmhmm
    - iupred2a.py
  smallrna_required_tools:
    - cutadapt
    - bowtie
    - bowtie-build
    - samtools
    - featureCounts
    - Rscript
    - R::DESeq2
  sra_required_tools:
    - prefetch
    - fasterq-dump
  sra_limited_required_tools:
    - fastq-dump
  optional_tools:
    - vdb-validate
  minimum_versions:
    python3: "3.9"
    snakemake: "9.0"
    fastqc: "0.11"
    multiqc: "1.14"
    fastp: "0.23"
    cutadapt: "3.0"
    bowtie: "1.2"
    bowtie-build: "1.2"
    STAR: "2.7"
    hisat2: "2.2"
    hisat2-build: "2.2"
    samtools: "1.15"
    featureCounts: "2.0"
    stringtie: "2.2"
    gffcompare: "0.12"
    Rscript: "4.1"
    "R::DESeq2": "1.36"
    "R::IsoformSwitchAnalyzeR": "2.0"
    prefetch: "3.0"
    fasterq-dump: "3.0"
    fastq-dump: "3.0"
    vdb-validate: "3.0"
  recommended_versions:
    python3: "3.11"
    snakemake: "9.0"
    fastqc: "0.12"
    multiqc: "1.25"
    fastp: "0.23"
    cutadapt: "4.0"
    bowtie: "1.3"
    bowtie-build: "1.3"
    STAR: "2.7.11"
    hisat2: "2.2.1"
    hisat2-build: "2.2.1"
    samtools: "1.20"
    featureCounts: "2.0.6"
    stringtie: "2.2.3"
    gffcompare: "0.12.6"
    Rscript: "4.4"
    "R::DESeq2": "1.44"
    "R::IsoformSwitchAnalyzeR": "2.0"
    prefetch: "3.0"
    fasterq-dump: "3.0"
    fastq-dump: "3.0"
    vdb-validate: "3.0"
