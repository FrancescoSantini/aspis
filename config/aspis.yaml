# ASPIS first-stage configuration.
#
# This file is intentionally separate from config/config.yaml, which still
# belongs to the legacy long/small RNA workflows.

intake: config/intake.tsv

paths:
  raw_dir: work/raw
  metadata_dir: meta/materialized
  manifest: meta/materialized_manifest.tsv
  environment_report: meta/environment_report.tsv
  sra_cache_dir: cache/sra
  scratch_dir: work/tmp
  branch_dir: results/branches

materialization:
  local_link_mode: symlink
  sra_max_size: 40G
  sra_spot_limit: 0
  validate_sra: true
  public_metadata_mode: auto
  ena_api_url: https://www.ebi.ac.uk/ena/portal/api/filereport
  public_metadata_timeout: 60

planning:
  allow_unclassified: false

design:
  condition_col: condition
  control_label: control
  covariates:
    - time_h
  min_condition_groups: 2

execution:
  default_partition: g100_usr_prod
  download_partition: g100_all_serial

environment:
  required_tools:
    - python3
    - snakemake
  sra_required_tools:
    - prefetch
    - fasterq-dump
  sra_limited_required_tools:
    - fastq-dump
  optional_tools:
    - vdb-validate
