# ASPIS first-stage configuration.
#
# This file is intentionally separate from config/config.yaml, which still
# belongs to the legacy long/small RNA workflows.

intake: config/intake.tsv

paths:
  raw_dir: work/raw
  metadata_dir: meta/materialized
  manifest: meta/materialized_manifest.tsv
  environment_report: meta/environment_report.tsv
  sra_cache_dir: cache/sra
  scratch_dir: work/tmp
  branch_dir: results/branches

materialization:
  local_link_mode: symlink
  sra_max_size: 40G
  sra_spot_limit: 0
  validate_sra: true
  public_metadata_mode: auto
  ena_api_url: https://www.ebi.ac.uk/ena/portal/api/filereport
  public_metadata_timeout: 60

planning:
  allow_unclassified: false

design:
  condition_col: condition
  control_label: control
  covariates:
    - time_h
  min_condition_groups: 2

fastq_inspection:
  max_records: 100000

fastqc:
  command: fastqc
  threads: 2
  extra_args: ""

multiqc:
  command: multiqc
  extra_args: ""

rnaseq_preprocess:
  command: fastp
  threads: 2
  extra_args: ""

rnaseq_alignment:
  run: false
  aligner: star
  hisat2_command: hisat2
  hisat2_build_command: hisat2-build
  star_command: STAR
  samtools_command: samtools
  reference_fasta: ""
  hisat2_index_prefix: ""
  star_genome_dir: ""
  annotation_gtf: ""
  strandness: ""
  threads: 4
  index_threads: 8
  extra_args: ""
  star_sjdb_overhang: ""
  star_genome_sa_index_nbases: ""
  star_extra_index_args: ""
  star_tmp_dir: ""

rnaseq_quantification:
  run: false
  transcriptome_mode: reference_guided_novel
  gene_counter: featurecounts
  featurecounts_command: featureCounts
  stringtie_command: stringtie
  gffcompare_command: gffcompare
  reference_fasta: ""
  annotation_gtf: ""
  read_length: 75
  threads: 4
  featurecounts_threads: 4
  stringtie_threads: 4
  featurecounts_single_extra_args: ""
  featurecounts_paired_extra_args: "-p --countReadPairs"
  featurecounts_extra_args: ""
  stringtie_strandness: ""
  stringtie_assembly_extra_args: ""
  stringtie_merge_extra_args: ""
  stringtie_quant_extra_args: ""
  known_codes_strict: "=,j"
  known_codes_lenient: "=,j,c,o"
  gene_type_view: strict

rnaseq_differential:
  run: false
  method: deseq2
  levels:
    - gene
  reports: true
  report_top_n: 50
  report_feature_sets: ""
  report_feature_set_tables: ""
  report_feature_set_min_overlap: 2
  report_feature_set_top_n: 20
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  isoform_switch_script: workflow/scripts/run_isoform_switch_contrast.R
  isoform_switch_gene_expr: 1.0
  isoform_switch_isoform_expr: 1.0
  isoform_switch_padj: 0.1
  isoform_switch_dif: 0.1
  isoform_switch_max_genes: 30
  isoform_switch_genome_object: ""
  condition_col: condition
  control_label: control
  contrast_by: []
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0

smallrna:
  run: false
  preprocess_run: false
  depletion_run: false
  alignment_run: false
  quantification_run: false
  adapter: AGATCGGAAGAGCACACGTCTGAACTCC
  min_length: 15
  max_length: 30
  quality_cutoff: 20
  cutadapt_overlap: 5
  cutadapt_command: cutadapt
  cutadapt_extra_args: ""
  threads: 1
  reference_run: false
  reference_dir: work/smallrna_reference
  mirbase_species_prefix: ""
  mirbase_replace_u_with_t: true
  prepared_mirbase_fasta: ""
  prepared_mirbase_saf: ""
  build_bowtie_index: false
  build_contaminant_index: false
  bowtie_build_command: bowtie-build
  bowtie_command: bowtie
  samtools_command: samtools
  index_threads: 1
  contaminant_mismatches: 1
  alignment_mismatches: 2
  alignment_multi_alignments: 10
  alignment_extra_args: "--best --strata"
  featurecounts_command: featureCounts
  featurecounts_threads: 1
  featurecounts_extra_args: ""
  differential_run: false
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  min_count: 10
  mirbase_fasta: ""
  mirbase_saf: ""
  bowtie_index_prefix: ""
  contaminant_fasta: ""
  contaminant_index_prefix: ""
  target_enrichment_mode: disabled
  target_table: ""
  target_min_overlap: 1
  target_top_n: 20
  reports: true
  condition_col: condition
  control_label: control
  contrast_by: []
  min_replicates_per_group: 2
  padj: 0.1
  log2fc: 1.0

execution:
  default_partition: g100_usr_prod
  download_partition: g100_all_serial

environment:
  required_tools:
    - python3
    - snakemake
    - fastqc
    - multiqc
  rnaseq_required_tools:
    - fastp
  rnaseq_alignment_required_tools: auto
  rnaseq_quantification_required_tools:
    - featureCounts
    - stringtie
    - gffcompare
  rnaseq_differential_required_tools:
    - Rscript
  smallrna_required_tools:
    - cutadapt
    - bowtie
    - bowtie-build
    - samtools
    - featureCounts
    - Rscript
  sra_required_tools:
    - prefetch
    - fasterq-dump
  sra_limited_required_tools:
    - fastq-dump
  optional_tools:
    - vdb-validate
