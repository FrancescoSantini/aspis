# Machine-readable source policy for ASPIS open resource bundles.
#
# This file is not a run config and does not download anything by itself.
# It records which source categories are acceptable for the default open
# validation path, and which resources must remain explicit user-provided
# manual inputs because their licenses or terms are not open defaults.
#
# The companion test tests/validate_open_resource_policy.py keeps restricted
# resources from silently becoming default ASPIS resources.

open_resource_sources:
  rnaseq_feature_sets:
    - resource_id: go_gaf_human
      source: GO
      provider: Gene Ontology Consortium
      collection: GO annotations
      resource_kind: go_gaf
      license_status: open
      recommended_for_default_bundle: true
      auto_download: false
      url: https://current.geneontology.org/annotations/goa_human.gaf.gz
      preparation_script: workflow/scripts/prepare_feature_set_resources.py
      preparation_argument: --go-gaf
      companion_argument: --go-obo
      identifier_namespace_before_mapping: gene_symbol_or_uniprot
      normalized_identifier_namespace: gtf_gene_id
      notes: Use with go-basic.obo and the same GTF used for counting.
    - resource_id: go_obo_basic
      source: GO
      provider: Gene Ontology Consortium
      collection: GO ontology
      resource_kind: go_obo
      license_status: open
      recommended_for_default_bundle: true
      auto_download: false
      url: https://current.geneontology.org/ontology/go-basic.obo
      preparation_script: workflow/scripts/prepare_feature_set_resources.py
      preparation_argument: --go-obo
      normalized_identifier_namespace: not_applicable
      notes: Ontology metadata source for GO term names and namespaces.
    - resource_id: reactome_ensembl_all_levels
      source: Reactome
      provider: Reactome
      collection: Reactome pathways
      resource_kind: reactome_mapping
      license_status: open
      recommended_for_default_bundle: true
      auto_download: false
      url: https://reactome.org/download/current/Ensembl2Reactome_All_Levels.txt
      preparation_script: workflow/scripts/prepare_feature_set_resources.py
      preparation_argument: --reactome
      identifier_namespace_before_mapping: ensembl_gene_id
      normalized_identifier_namespace: gtf_gene_id
      notes: Freeze the downloaded release beside project inputs before preparing ASPIS TSVs.
    - resource_id: open_gmt_user_reviewed
      source: open_gmt
      provider: user_reviewed_open_source
      collection: user_reviewed_open_sets
      resource_kind: gmt
      license_status: user_provided
      recommended_for_default_bundle: false
      auto_download: false
      url: ''
      preparation_script: workflow/scripts/prepare_feature_set_resources.py
      preparation_argument: --gmt
      identifier_namespace_before_mapping: source_defined
      normalized_identifier_namespace: gtf_gene_id
      notes: Use for WikiPathways exports or project-owned GMT only after license review.
  smallrna_targets:
    - resource_id: project_open_mirna_targets
      source: project_owned_or_open_reviewed
      provider: user
      collection: mirna_target_interactions
      resource_kind: smallrna_target_table_source
      license_status: user_provided
      recommended_for_default_bundle: false
      auto_download: false
      url: ''
      preparation_script: workflow/scripts/prepare_mirna_target_resources.py
      preparation_argument: --input
      identifier_namespace_before_mapping: gene_symbol_or_gtf_gene_id
      normalized_identifier_namespace: gtf_gene_id
      notes: ASPIS has no universal bundled miRNA-target database; provide a reviewed local export.
  isoform_consequence_annotations:
    - resource_id: interproscan_user_output
      source: InterProScan
      provider: user_site_install
      collection: protein_domains
      resource_kind: precomputed_annotation_table
      license_status: user_provided
      recommended_for_default_bundle: false
      auto_download: false
      url: ''
      preparation_script: none
      preparation_argument: isoform_switch_functional_annotation_tables
      identifier_namespace_before_mapping: transcript_or_protein_id
      normalized_identifier_namespace: isoform_id
      notes: Use precomputed TSV output generated by the user's licensed local installation.
    - resource_id: pfam_hmmer_user_output
      source: Pfam/HMMER
      provider: user_site_install
      collection: protein_domains
      resource_kind: precomputed_annotation_table
      license_status: user_provided
      recommended_for_default_bundle: false
      auto_download: false
      url: ''
      preparation_script: none
      preparation_argument: isoform_switch_functional_annotation_tables
      identifier_namespace_before_mapping: transcript_or_protein_id
      normalized_identifier_namespace: isoform_id
      notes: Use precomputed hmmscan/domtblout output only when local database terms permit use.

restricted_or_manual_only:
  - resource_id: kegg
    source: KEGG
    resource_kind: pathway_database
    license_status: restricted
    recommended_for_default_bundle: false
    auto_download: false
    notes: Do not download, bundle, or imply as a free ASPIS default; accept only explicit local user-provided paths when allowed by the user's license.
  - resource_id: msigdb
    source: MSigDB
    resource_kind: gene_set_database
    license_status: restricted
    recommended_for_default_bundle: false
    auto_download: false
    notes: Registration/licensing terms make this manual-only, not a default ASPIS resource.
  - resource_id: signalp
    source: SignalP
    resource_kind: protein_consequence_tool
    license_status: restricted
    recommended_for_default_bundle: false
    auto_download: false
    notes: Only use explicit local outputs or command templates when the user has rights to run the tool.
  - resource_id: tmhmm
    source: TMHMM
    resource_kind: protein_consequence_tool
    license_status: restricted
    recommended_for_default_bundle: false
    auto_download: false
    notes: Only use explicit local outputs or command templates when the user has rights to run the tool.
  - resource_id: deeptmhmm
    source: DeepTMHMM
    resource_kind: protein_consequence_tool
    license_status: restricted
    recommended_for_default_bundle: false
    auto_download: false
    notes: Treat as manual-only unless a project verifies terms compatible with its use.
