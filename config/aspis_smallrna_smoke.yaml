# ASPIS local smallRNA parity scaffold smoke-test configuration.
#
# This smoke test exercises smallRNA intake classification, generic branch QC,
# design summarization, environment reporting, and the explicit smallRNA parity
# plan. It does not run cutadapt, Bowtie, featureCounts, DESeq2, or target
# enrichment yet.

intake: config/intake_smallrna_smoke.tsv

paths:
  raw_dir: work/smallrna_smoke/raw
  metadata_dir: meta/smallrna_smoke/materialized
  manifest: meta/smallrna_smoke/materialized_manifest.tsv
  analysis_plan: meta/smallrna_smoke/analysis_plan.tsv
  environment_report: meta/smallrna_smoke/environment_report.tsv
  sra_cache_dir: cache/smallrna_smoke/sra
  scratch_dir: work/smallrna_smoke/tmp
  branch_dir: results/smallrna_smoke/branches

materialization:
  local_link_mode: symlink

design:
  condition_col: condition
  control_label: control
  covariates:
    - time_h
  min_condition_groups: 2

fastq_inspection:
  max_records: 1000

smallrna:
  run: true
  preprocess_run: false
  adapter: AGATCGGAAGAGCACACGTCTGAACTCC
  min_length: 15
  max_length: 30
  quality_cutoff: 20
  cutadapt_overlap: 5
  cutadapt_command: cutadapt
  cutadapt_extra_args: ""
  threads: 1
  mirbase_fasta: ""
  mirbase_saf: ""
  bowtie_index_prefix: ""
  contaminant_fasta: ""
  contaminant_index_prefix: ""
  target_enrichment_mode: disabled
  target_table: ""
  reports: true
  condition_col: condition
  control_label: control
  contrast_by:
    - time_h
  min_replicates_per_group: 2
  padj: 0.1
  log2fc: 1.0

environment:
  required_tools:
    - python3
    - snakemake
    - fastqc
    - multiqc
  smallrna_required_tools: []
  optional_tools:
    - cutadapt
    - bowtie
    - bowtie-build
    - samtools
    - featureCounts
    - Rscript
