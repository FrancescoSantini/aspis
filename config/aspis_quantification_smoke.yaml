# ASPIS local RNA-seq quantification smoke-test configuration.
#
# This config builds a tiny STAR index, aligns the default local FASTQ fixtures,
# and exercises featureCounts, StringTie, gffcompare, and transcript matrix
# generation. It is only a technical smoke test, not a biological reference.

intake: config/intake.tsv

paths:
  raw_dir: work/quantification_smoke/raw
  metadata_dir: meta/quantification_smoke/materialized
  manifest: meta/quantification_smoke/materialized_manifest.tsv
  analysis_plan: meta/quantification_smoke/analysis_plan.tsv
  environment_report: meta/quantification_smoke/environment_report.tsv
  sra_cache_dir: cache/quantification_smoke/sra
  scratch_dir: work/quantification_smoke/tmp
  branch_dir: results/quantification_smoke/branches

materialization:
  local_link_mode: symlink
  sra_max_size: 1G
  sra_spot_limit: 0
  validate_sra: true
  public_metadata_mode: auto
  ena_api_url: https://www.ebi.ac.uk/ena/portal/api/filereport
  public_metadata_timeout: 60

planning:
  allow_unclassified: false

design:
  condition_col: condition
  control_label: control
  covariates:
    - time_h
  min_condition_groups: 2

fastq_inspection:
  max_records: 10000

fastqc:
  command: fastqc
  threads: 1
  extra_args: ""

multiqc:
  command: multiqc
  extra_args: ""

rnaseq_preprocess:
  command: fastp
  threads: 1
  extra_args: ""

rnaseq_alignment:
  run: true
  aligner: star
  hisat2_command: hisat2
  hisat2_build_command: hisat2-build
  star_command: STAR
  samtools_command: samtools
  reference_fasta: tests/reference/rnaseq_toy.fa
  hisat2_index_prefix: ""
  star_genome_dir: work/quantification_smoke/reference/star
  annotation_gtf: tests/reference/rnaseq_toy.gtf
  strandness: ""
  threads: 2
  index_threads: 2
  extra_args: ""
  star_sjdb_overhang: 11
  star_genome_sa_index_nbases: 2
  star_extra_index_args: "--genomeChrBinNbits 4"
  star_tmp_dir: "/tmp/aspis_quantification_smoke"

rnaseq_quantification:
  run: true
  transcriptome_mode: reference_guided_novel
  gene_counter: featurecounts
  featurecounts_command: featureCounts
  stringtie_command: stringtie
  gffcompare_command: gffcompare
  reference_fasta: tests/reference/rnaseq_toy.fa
  annotation_gtf: tests/reference/rnaseq_toy.gtf
  read_length: 12
  threads: 1
  featurecounts_threads: 1
  stringtie_threads: 1
  featurecounts_single_extra_args: ""
  featurecounts_paired_extra_args: "-p --countReadPairs"
  featurecounts_extra_args: ""
  stringtie_strandness: ""
  stringtie_assembly_extra_args: "-m 30 -c 0.001 -s 0.001"
  stringtie_merge_extra_args: "-m 30 -c 0.001"
  stringtie_quant_extra_args: ""
  known_codes_strict: "="
  known_codes_lenient: "=,c,k,m,n,y"
  gene_type_view: strict

execution:
  default_partition: g100_usr_prod
  download_partition: g100_all_serial

environment:
  required_tools:
    - python3
    - snakemake
    - fastqc
    - multiqc
  rnaseq_required_tools:
    - fastp
  rnaseq_alignment_required_tools: auto
  rnaseq_quantification_required_tools:
    - featureCounts
    - stringtie
    - gffcompare
  sra_required_tools:
    - prefetch
    - fasterq-dump
  sra_limited_required_tools:
    - fastq-dump
  optional_tools:
    - vdb-validate
