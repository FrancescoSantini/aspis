# Local real-data subset for comparing ASPIS output against the legacy PhD pipeline.
#
# Scope: BEAS_2B, 24h, control vs PS_100uM, three replicates, RNA-seq + smallRNA.
# It reuses the legacy local reference assets under ../phdpipe/genome and keeps
# expensive network/public metadata steps disabled.

intake: config/intake_phdpipe_subset_beas24.tsv

paths:
  raw_dir: work/phdpipe_subset_beas24/raw
  metadata_dir: meta/phdpipe_subset_beas24/materialized
  manifest: meta/phdpipe_subset_beas24/materialized_manifest.tsv
  analysis_plan: meta/phdpipe_subset_beas24/analysis_plan.tsv
  environment_report: meta/phdpipe_subset_beas24/environment_report.tsv
  execution_report: meta/phdpipe_subset_beas24/execution_report.tsv
  sra_cache_dir: cache/phdpipe_subset_beas24/sra
  scratch_dir: work/phdpipe_subset_beas24/tmp
  branch_dir: results/phdpipe_subset_beas24/branches

materialization:
  local_link_mode: symlink
  public_metadata_mode: "off"

planning:
  allow_unclassified: false

design:
  condition_col: condition
  control_label: control
  covariates:
    - time_h
  min_condition_groups: 2

fastq_inspection:
  max_records: 100000

fastqc:
  command: fastqc
  threads: 2
  extra_args: ""

multiqc:
  command: multiqc
  extra_args: ""

rnaseq_preprocess:
  command: fastp
  threads: 4
  extra_args: ""

rnaseq_alignment:
  run: true
  aligner: hisat2
  hisat2_command: hisat2
  hisat2_build_command: hisat2-build
  star_command: STAR
  samtools_command: samtools
  reference_fasta: ../phdpipe/genome/Homo_sapiens.GRCh38.dna.toplevel.fa
  hisat2_index_prefix: ../phdpipe/genome/hisat2_index/genome
  star_genome_dir: ""
  annotation_gtf: ../phdpipe/genome/Homo_sapiens.GRCh38.112.chr.gtf
  strandness: ""
  infer_strandedness: false
  threads: 4
  index_threads: 4
  extra_args: ""

rnaseq_quantification:
  run: true
  transcriptome_mode: reference_guided_novel
  gene_counter: featurecounts
  featurecounts_command: featureCounts
  stringtie_command: stringtie
  gffcompare_command: gffcompare
  reference_fasta: ../phdpipe/genome/Homo_sapiens.GRCh38.dna.toplevel.fa
  annotation_gtf: ../phdpipe/genome/Homo_sapiens.GRCh38.112.chr.gtf
  read_length: 75
  threads: 4
  featurecounts_threads: 4
  stringtie_threads: 4
  featurecounts_single_extra_args: ""
  featurecounts_paired_extra_args: "-p --countReadPairs"
  featurecounts_extra_args: ""
  stringtie_strandness: ""
  stringtie_assembly_extra_args: ""
  stringtie_merge_extra_args: ""
  stringtie_quant_extra_args: ""
  known_codes_strict: "="
  known_codes_lenient: "=,c,k,m,n,y"
  gene_type_view: strict
  biotype_summary: true

rnaseq_differential:
  run: true
  method: deseq2
  levels:
    - gene
    - transcript
  reports: true
  report_top_n: 50
  report_feature_sets: ""
  report_feature_set_tables: ""
  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  contrast_by:
    - time_h
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0
  lfc_shrinkage: none

smallrna:
  run: true
  preprocess_run: true
  depletion_run: true
  alignment_run: true
  quantification_run: true
  differential_run: true

  adapter: AGATCGGAAGAGCACACGTCTGAACTCC
  min_length: 15
  max_length: 30
  quality_cutoff: 20
  cutadapt_overlap: 5
  cutadapt_command: cutadapt
  cutadapt_extra_args: ""
  threads: 4

  reference_run: false
  reference_dir: work/phdpipe_subset_beas24/smallrna_reference
  mirbase_species_prefix: hsa
  mirbase_replace_u_with_t: true
  mirbase_fasta: ../phdpipe/genome/mature.fa
  mirbase_saf: ../phdpipe/genome/mirbase.saf
  prepared_mirbase_fasta: ""
  prepared_mirbase_saf: ""

  build_bowtie_index: false
  build_contaminant_index: false
  bowtie_build_command: bowtie-build
  bowtie_command: bowtie
  samtools_command: samtools
  index_threads: 4
  bowtie_index_prefix: ../phdpipe/genome/bowtie_index/mirbase
  contaminant_fasta: ../phdpipe/genome/contaminants.fa
  contaminant_index_prefix: ../phdpipe/genome/contaminants_index/contaminants
  contaminant_mismatches: 1
  alignment_mismatches: 2
  alignment_multi_alignments: 10
  alignment_extra_args: "--best --strata"

  residual_run: false
  build_residual_genome_index: false
  residual_genome_fasta: ../phdpipe/genome/Homo_sapiens.GRCh38.dna.toplevel.fa
  residual_genome_index_prefix: ""
  residual_annotation_gtf: ../phdpipe/genome/Homo_sapiens.GRCh38.112.chr.gtf

  featurecounts_command: featureCounts
  featurecounts_threads: 4
  featurecounts_extra_args: ""

  rscript_command: Rscript
  deseq2_script: workflow/scripts/run_deseq2_feature.R
  condition_col: condition
  control_label: control
  design_formula: ""
  contrast_by:
    - time_h
  min_replicates_per_group: 2
  min_count: 10
  padj: 0.1
  log2fc: 1.0
  lfc_shrinkage: none

  target_enrichment_mode: disabled
  target_table: ""
  target_tables: []
  target_cache: ""
  target_feature_sets: ""
  target_feature_set_tables: ""
  mirna_feature_sets: ""
  mirna_feature_set_tables: ""
  reports: true

mirna_mrna_integration:
  run: false

biological_qc:
  run: true
  rnaseq_sample_qc: true
  smallrna_sample_qc: true
  smallrna_length_qc: true

provenance:
  run: true
